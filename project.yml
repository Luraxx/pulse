name: Pulse
options:
  bundleIdPrefix: net.dehlwes
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.0"
    CODE_SIGN_STYLE: Automatic
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: "1.0"
    ENABLE_USER_SCRIPT_SANDBOXING: YES

targets:
  Pulse:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    scheme:
      testTargets: []
    dependencies:
      - target: PulseWidget
    entitlements:
      path: App/Pulse.entitlements
      properties:
        com.apple.security.application-groups:
          - group.net.dehlwes.pulse
    sources:
      - path: App
      - path: Core
        excludes:
          - Package.swift
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: Pulse
        UILaunchScreen: {}
        UIUserInterfaceStyle: Dark
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
        UIBackgroundModes:
          - fetch
        BGTaskSchedulerPermittedIdentifiers:
          - net.dehlwes.pulse.refresh
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.dehlwes.pulse
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_CFBundleDisplayName: Pulse

  PulseWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    entitlements:
      path: PulseWidget/PulseWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.net.dehlwes.pulse
    sources:
      - path: PulseWidget
    info:
      path: PulseWidget/Info.plist
      properties:
        CFBundleDisplayName: Pulse
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.dehlwes.pulse.widget
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_KEY_CFBundleDisplayName: Pulse
